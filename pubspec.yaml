name: juno_app
description: "Juno - Voice-first personal AI assistant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_crashlytics: ^4.3.5

  # Auth
  google_sign_in: ^6.2.2

  # Network
  http: ^1.4.0
  connectivity_plus: ^6.1.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.5.3

  # Audio — real-time PCM recording + streaming playback
  flutter_sound: ^9.15.11

  # Runtime permissions (microphone)
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # Drop your "Hey Juno" .ppn file here from Picovoice Console.
    # Placeholder: using built-in keyword until custom model is added.
    - assets/wake_word/
