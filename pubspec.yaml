name: juno_app
description: "Juno - Voice-first personal AI assistant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons:

  # State management
  provider:

  # Firebase
  firebase_core:
  firebase_auth:
  cloud_firestore:
  firebase_crashlytics:
  firebase_messaging:
  flutter_local_notifications:

  # Auth
  google_sign_in:

  # Network
  http:
  connectivity_plus:

  # Markdown rendering for chat responses
  flutter_markdown_plus:
  url_launcher:

  # Utilities
  uuid:
  intl:
  shared_preferences:

  # Audio — real-time PCM recording + streaming playback
  flutter_sound:

  # Camera / image selection for nutrition scanner
  image_picker:

  # Runtime permissions (microphone, camera)
  permission_handler:

  # Local database — persistent chat history
  drift:
  drift_flutter:
  sqlite3_flutter_libs:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  drift_dev:
  build_runner:

flutter:
  uses-material-design: true

  assets:
    # Drop your "Hey Juno" .ppn file here from Picovoice Console.
    # Placeholder: using built-in keyword until custom model is added.
    - assets/wake_word/
